spring.application.name=Interactive_map_Ostrava

# Dynamické p?ipojení k PostgreSQL (Priorita má hosting, pak tv?j Docker)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ostrava_db}
spring.datasource.username=${DATABASE_USER:user}
spring.datasource.password=${DATABASE_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate nastavení
# POZOR: Pro produkci (hosting) zm?? "create-drop" na "update",
# jinak ti hosting p?i ka?dém restartu (uspání) sma?e naimportovaná data!
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Klí?ové nastavení pro prostorová data (PostGIS)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect