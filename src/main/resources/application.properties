spring.application.name=Interactive_map_Ostrava

# Nastavenÿ p?ipojenÿ k PostgreSQL v Dockeru
spring.datasource.url=jdbc:postgresql://localhost:5432/ostrava_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate nastavenÿ
# create-drop: p?i ka?dÚm startu sma?e a znovu vytvo?ÿ tabulky (super pro v²voj)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Klÿ?ovÚ nastavenÿ pro prostorovß data (PostGIS)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect