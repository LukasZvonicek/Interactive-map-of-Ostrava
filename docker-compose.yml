version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3 # Oficiální obraz PostgreSQL + PostGIS
    container_name: ostrava-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ostrava_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: