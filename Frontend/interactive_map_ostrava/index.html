<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kvalita prostředí - Ostrava</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        body { font-family: Arial, sans-serif; margin: 20px; }
    </style>
</head>
<body>
    <h1>Interaktivní mapa kvality prostředí v Ostravě</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializace mapy (střed Ostravy)
        const map = L.map('map').setView([49.820, 18.260], 12);

        // 2. Přidání podkladové mapy (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Načtení dat z tvého IntelliJ backendu
        async function loadMapData() {
            try {
                const response = await fetch('http://localhost:8080/api/locations');
                const locations = await response.json();

                locations.forEach(loc => {
                    // Logika barvy: Zelená pro dobrou kvalitu, oranžová pro horší
                    const markerColor = loc.value > 60 ? 'green' : 'orange';

                    L.circleMarker([loc.lat, loc.lon], {
                        radius: 12,
                        fillColor: markerColor,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    })
                    .addTo(map)
                    .bindPopup(`<b>${loc.name}</b><br>Kvalita prostředí: ${loc.value}%`);
                });
            } catch (error) {
                console.error('Chyba při načítání dat:', error);
                alert('Nepodařilo se připojit k Java backendu. Běží ti IntelliJ?');
            }
        }

        loadMapData();
    </script>
</body>
</html>
