<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Analýza Ostravy - Bakalářská práce</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/wicket/wicket.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { flex: 3; height: 100%; }
        #sidebar { 
            flex: 1; 
            background: #f8f9fa; 
            border-left: 2px solid #005aa7; 
            display: flex; 
            flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        .header { background: #005aa7; color: white; padding: 15px; text-align: center; }
        .content { padding: 15px; overflow-y: auto; flex-grow: 1; }
        .result-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .result-item:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-tag {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <div class="header">
        <h2>Analýza okolí</h2>
    </div>
    <div class="content">
        <div id="status" style="color: #666; margin-bottom: 10px;">Klikněte do mapy...</div>
        <div id="results-count" style="font-weight: bold; margin-bottom: 15px;"></div>
        <div id="results-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inicializace mapy (střed Ostrava)
    const map = L.map('map').setView([49.835, 18.292], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let analysisLayer = L.layerGroup().addTo(map);
    const wktParser = new Wkt.Wkt();

    // Barvy podle kategorií
    const colors = {
        'MHD': '#005aa7',      // Modrá
        'SKOLA': '#d32f2f',    // Červená
        'PARKOVANI': '#616161',// Šedá
        'CYKLO': '#2e7d32',    // Zelená
        'SPORT': '#f57c00'     // Oranžová
    };

    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        const radius = 500;

        analysisLayer.clearLayers();
        document.getElementById('status').innerText = "Načítám data z backendu...";
        
        // Vykreslení kruhu analýzy
        L.circle([lat, lng], { radius, color: '#005aa7', fillOpacity: 0.05 }).addTo(analysisLayer);

        try {
            const response = await fetch(`http://localhost:8080/api/locations?lat=${lat}&lon=${lng}&radius=${radius}`);
            const data = await response.json();

            displayOnMap(data.mapData);
            updateSidebar(data.panelData);
            
            document.getElementById('status').innerText = "";
            document.getElementById('results-count').innerText = `Nalezeno unikátních prvků: ${data.panelData.length}`;
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Chyba při komunikaci se serverem.";
        }
    });

    function displayOnMap(mapData) {
        const ostravaBlue = '#005aa7'; // Definice modré přímo zde

        mapData.forEach(obj => {
            wktParser.read(obj.geometry);
            const geojson = wktParser.toJson();

            L.geoJSON(geojson, {
                style: { 
                    color: ostravaBlue, // Čára bude modrá
                    weight: 5, 
                    opacity: 0.8 
                },
                pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                    radius: 7,
                    fillColor: ostravaBlue, // Vnitřek tečky bude modrý
                    color: "#fff",          // Okraj bílý
                    weight: 2,
                    fillOpacity: 0.9
                })
            }).addTo(analysisLayer).bindPopup(`<b>${obj.name}</b><br>${obj.category}`);
        });
    }

    function updateSidebar(panelData) {
        const list = document.getElementById('results-list');
        list.innerHTML = '';

        panelData.forEach(obj => {
            const color = colors[obj.category] || '#9e9e9e';
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <span class="category-tag" style="background:${color}">${obj.category}</span>
                <div style="margin-top:8px;"><strong>${obj.name}</strong></div>
            `;
            
            item.onclick = () => {
                map.setView([obj.lat, obj.lon], 17);
                L.popup().setLatLng([obj.lat, obj.lon]).setContent(`<b>${obj.name}</b>`).openOn(map);
            };
            list.appendChild(item);
        });
    }

    // Naslouchání klávese ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === "Escape") {
            // 1. Vymazat vrstvu s analýzou (kruh, body, čáry)
            analysisLayer.clearLayers();
        
            // 2. Vymazat seznam v sidebaru
            document.getElementById('results-list').innerHTML = '';
        
            // 3. Resetovat nápisy
            document.getElementById('status').innerText = "Klikněte do mapy...";
            document.getElementById('results-count').innerText = "";
        
            // 4. Zavřít otevřené bubliny (popupy) na mapě
            map.closePopup();

            console.log("Výběr zrušen klávesou ESC");
        }
    });
</script>
</body>
</html>
