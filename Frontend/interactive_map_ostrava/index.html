<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Prostředí Ostrav - Bakalářská práce</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/wicket/wicket.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Hlavní rozložení */
        #map { flex: 3; height: 100%; position: relative; }
        
        #sidebar { 
            width: 350px;
            height: 100vh; 
            background: #ffffff; 
            border-left: 2px solid #005aa7; 
            position: relative;
            transition: margin-right 0.3s ease; 
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        #result-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            max-height: 100vh;
        }

        #results-list::-webkit-scrollbar{
            width: 8px;
        }
        #results-list::-webkit-scrollbar-thumb {
            background: #005aa7;
            border-radius: 4px;
        }
        
        /* schovaný stav */
        #sidebar.collapsed {
            margin-right: -350px;
        }

        /* Šipka */
        #toggle-sidebar {
            position: absolute;
            left: -32px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: #005aa7;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px 0 0 8px;
            font-size: 20px;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
        }

        /*Vyhledávací okno*/
        #search-container {
            position: absolute;
            top: 20px;
            left: calc(300px + (100% - 300px - 350px) / 2);
            transform: translateX(-50%);
            z-index: 1100;
            width: 400px;
        }

        #map-search {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #005aa7;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        #autocomplete-results {
            background: white;
            border-radius: 15px;
            margin-top: 5px;
            border: 1px solid #ccc;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-item:first-child { border-radius: 15px 15px 0 0; }
        .search-item:last-child { border-radius: 0 0 15px 15 px; border-bottom: none; }

        .search-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .search-item:hover {
            background-color: #f0f0f0;
        }        

        /* Levý ovládací panel */
        #left-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 240px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-left: 5px solid #005aa7;
        }

        .header { background: #005aa7; color: white; padding: 15px; text-align: center; }
        .content { padding: 15px; overflow-y: auto; flex-grow: 1; }

        /* Filtry a Slider */
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .radius-value { font-size: 1.2em; font-weight: bold; color: #005aa7; }
        /* Základní vzhled lišty (track) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 5px;
            outline: none;
            margin: 15px 0;
        }

        /* Vzhled modré čáry (pro Chrome/Safari) */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #005aa7; /* Ostravská modrá */
            border-radius: 5px;
        }

        /* Vzhled samotného kolečka (thumb) pro Chrome/Safari */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #005aa7; /* Modrý okraj kolečka */
            cursor: pointer;
            margin-top: -7px; /* Vycentrování vůči čáře */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }

        /* Efekt při najetí na kolečko */
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #f0f7ff;
        }

        /* Úprava pro Firefox */
        input[type="range"]::-moz-range-track {
            background: #005aa7;
            height: 6px;
            border-radius: 5px;
        }
        input[type="range"]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #005aa7;
            cursor: pointer;
        }
                
        .checkbox-list { font-size: 0.9em; line-height: 1.6; }
        .checkbox-list input { margin-right: 8px; }

        /* Položky v pravém seznamu */
        .result-item {
            background: #fdfdfd;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: all 0.2s;
        }
        .result-item:hover { background: #f0f7ff; border-color: #005aa7; transform: translateX(-5px); }
        
        .category-tag {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            background: #005aa7;
            text-transform: uppercase;
        }

        hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
        .checkbox-list small {
            color: #666;      /* Šedá barva, aby to nebilo do očí */
            font-size: 0.85em; /* O něco menší než hlavní text */
            margin-left: 5px;
        }

        /* Pokud chceš, aby čísla, která nejsou nula, byla výraznější */
        .checkbox-list span:not(:empty) {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="map-search" placeholder="Hledejte adresu nebo objekt..." autocomplete="off">
    <div id="autocomplete-results"></div>
</div>

<div id="left-panel">
    <div class="filter-group">
        <label>Radius</label>
        <input type="range" id="radius-slider" min="200" max="2000" step="100" value="500">
        <div style="text-align: center; margin-top: 5px;">
            <span id="radius-val" class="radius-value">500</span> <span style="font-weight: bold; color: #005aa7;">m</span>
        </div>
    </div>
    
    <hr>
    
    <div class="filter-group">
    <label>Zobrazit kategorie</label>
    <div class="checkbox-list">
        <input type="checkbox" class="cat-filter" value="ZASTÁVKA MHD" checked> ZASTÁVKY MHD 
        <small>(<span id="count-ZASTÁVKA MHD">0</span>)</small><br>
        
        <input type="checkbox" class="cat-filter" value="ŠKOLSKÉ ZAŘÍZENÍ" checked> ŠKOLSKÁ ZAŘÍZENÍ 
        <small>(<span id="count-ŠKOLSKÉ ZAŘÍZENÍ">0</span>)</small><br>
        
        <input type="checkbox" class="cat-filter" value="PARKOVÁNÍ" checked> PARKOVÁNÍ 
        <small>(<span id="count-PARKOVÁNÍ">0</span>)</small><br>
        
        <input type="checkbox" class="cat-filter" value="PARKOVACÍ ZÓNA" checked> PARKOVACÍ ZÓNY 
        <small>(<span id="count-PARKOVACÍ ZÓNA">0</span>)</small><br>
        
        <input type="checkbox" class="cat-filter" value="CYKLOSTEZKA" checked> CYKLOSTEZKY 
        <small>(<span id="count-CYKLOSTEZKA">0</span>)</small><br>
        
        <input type="checkbox" class="cat-filter" value="SPORTOVIŠTĚ" checked> SPORTOVIŠTĚ 
        <small>(<span id="count-SPORTOVIŠTĚ">0</span>)</small>
    </div>
</div>

    <div style="font-size: 0.8em; color: #777;">
        Tip: Kliknutím do mapy zobrazíte objekty. Klávesou <strong>ESC</strong> zrušíte výběr.
    </div>
</div>

<div id="map"></div>

<div id="sidebar">
    <div id="toggle-sidebar" onclick="toggleSidebar()">▶</div>

    <div class="header">
        <h2 style="margin:0; font-size: 1.2em;">Nalezené objekty</h2>
    </div>
    <div class="content">
        <div id="status" style="font-style: italic; color: #888; margin-bottom: 10px;">Klikněte do mapy...</div>
        <div id="results-count" style="margin-bottom: 15px; font-weight: bold; color: #005aa7;"></div>
        <div id="results-list"></div>
    </div>
</div>

<script>
    const categoryColors = {
    'ZASTÁVKA MHD': '#e74c3c',            // Výrazná červená
    'ŠKOLSKÉ ZAŘÍZENÍ': '#f1c40f',          // Žlutá
    'PARKOVÁNÍ': '#2c3e50',      // Tmavě modrá (půlnoční modř)
    'PARKOVACÍ ZÓNA': '#3498db', // Světle modrá
    'CYKLOSTEZKA': '#d81b60',     // Tmavě růžová (magentová)
    'SPORTOVIŠTĚ': '#27ae60',    // Zelená
    'default': '#7f8c8d'         // Šedá pro zbytek
    };

    // 1. OMEZENÍ MAPY NA OSTRAVU
    const ostravaBounds = L.latLngBounds(
        L.latLng(49.70, 18.10), 
        L.latLng(49.95, 18.45)
    );

    const map = L.map('map', {
        maxBounds: ostravaBounds,
        maxBoundsViscosity: 1.0,
        minZoom: 11
    }).setView([49.835, 18.292], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let analysisLayer = L.layerGroup().addTo(map);
    const wktParser = new Wkt.Wkt();
    const ostravaBlue = '#005aa7';

    // 2. OVLÁDÁNÍ RADIUSU
    let currentRadius = 500;
    const slider = document.getElementById('radius-slider');
    const radiusLabel = document.getElementById('radius-val');

    slider.oninput = function() {
        currentRadius = this.value;
        radiusLabel.innerText = currentRadius;
    };

    // 3. ANALÝZA PO KLIKNUTÍ
    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        
        // Získání aktivních filtrů
        const activeFilters = Array.from(document.querySelectorAll('.cat-filter:checked'))
                                   .map(cb => cb.value);

        analysisLayer.clearLayers();
        document.getElementById('status').innerText = "Komunikuji se serverem...";
        document.getElementById('results-list').innerHTML = '';

        // Vykreslení kruhu analýzy
        L.circle([lat, lng], { 
            radius: currentRadius, 
            color: ostravaBlue, 
            weight: 2,
            fillColor: ostravaBlue, 
            fillOpacity: 0.1 
        }).addTo(analysisLayer);

        try {
            const url = `http://localhost:8080/api/locations?lat=${lat}&lon=${lng}&radius=${currentRadius}`;
            const response = await fetch(url);
            const data = await response.json();

            // 1. Nejdříve vynulujeme všechna počítadla v legendě
            document.querySelectorAll('span[id^="count-"]').forEach(span => { span.innerText = "0"});

            const counts = {};

            // 2. Spočítáme výskyty pro každou kategorii v obdržených datech
            if (data.panelData) {
                data.panelData.forEach(obj => {
                    // Počítáme kategorii pro každý unikátní objekt v sidebaru
                    counts[obj.category] = (counts[obj.category] || 0) + 1;
                });
            }

            // 3. Zapíšeme nová čísla do HTML prvků
            for (const cat in counts) {
                const element = document.getElementById(`count-${cat}`);
                if (element) {
                    element.innerText = counts[cat];
                }
            }

            // Filtrování dat na straně klienta
            const filteredMapData = data.mapData.filter(obj => activeFilters.includes(obj.category));
            const filteredPanelData = data.panelData.filter(obj => activeFilters.includes(obj.category));

            displayOnMap(filteredMapData);
            updateSidebar(filteredPanelData);
            
            document.getElementById('status').innerText = "";
            document.getElementById('results-count').innerText = `Nalezeno prvků: ${filteredPanelData.length}`;
            
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Chyba: Server neodpovídá.";
        }
    });

    // 4. VYKRESLENÍ DO MAPY (BODY A LINIE)
    function displayOnMap(mapData) {
        mapData.forEach(obj => {
            try {
                wktParser.read(obj.geometry);
                const geojson = wktParser.toJson();

                const color = categoryColors[obj.category] || categoryColors['default'];

                L.geoJSON(geojson, {
                    style: {
                        color: color,
                        weight: 4,
                        opacity: 0.8,
                        fillColor: color,
                        fillOpacity: 0.4
                    },
                    pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: color,
                        color: "#ffffff",
                        weight: 2,
                        fillOpacity: 1
                    })
                }).addTo(analysisLayer).bindPopup(`<b>${obj.name || 'Bez názvu'}</b><br><small>${obj.category}</small>`);
            } catch (e) { console.error("Chyba zobrazení", e); }
        });
    }

    // 5. AKTUALIZACE SIDEBARU
    function updateSidebar(panelData) {
        const list = document.getElementById('results-list');
        list.innerHTML = '';

        panelData.forEach(obj => {
            const item = document.createElement('div');
            item.className = 'result-item';

            const displayName = (obj.name && obj.name !== "null" && obj.name !== "") ? obj.name : "Bez názvu";
            const color = categoryColors[obj.category] || categoryColors['default'];
            
            item.innerHTML = `
                <span class="category-tag" style ="background-color: ${color}">${obj.category}</span>
                <div style="margin-top:8px; color: #333;"><strong>${displayName}</strong></div>
            `;
            
            item.onclick = () => {
                map.setView([obj.lat, obj.lon], 16);
                L.popup().setLatLng([obj.lat, obj.lon])
                        .setContent(`<b>${displayName}</b><br>${obj.category}<small>`)
                        .openOn(map);
            };
            list.appendChild(item);
        });
    }

    // 6. KLÁVESA ESC - RESET
    document.addEventListener('keydown', function(e) {
        if (e.key === "Escape") {
            analysisLayer.clearLayers();
            document.getElementById('results-list').innerHTML = '';
            document.getElementById('status').innerText = "Klikněte do mapy...";
            document.getElementById('results-count').innerText = "";
            map.closePopup();
        }
    });

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar');
        
        // Přepne třídu .collapsed
        sidebar.classList.toggle('collapsed');
        
        // Otočí šipku
        if (sidebar.classList.contains('collapsed')) {
            toggleBtn.innerText = "◀";
        } else {
            toggleBtn.innerText = "▶";
        }
        
        // Zásadní pro Leaflet: Počkat na konec animace (300ms) a přepočítat mapu
        setTimeout(() => {
            map.invalidateSize();
        }, 300);
    }

    const searchInput = document.getElementById('map-search');
    const resultsContainer = document.getElementById('autocomplete-results');

    let searchTimer; // Globální proměnná pro časovač

searchInput.addEventListener('input', (e) => {
    const query = e.target.value;
    
    // Zrušíme předchozí plánovaný dotaz
    clearTimeout(searchTimer);

        if (query.length < 3) {
            resultsContainer.style.display = 'none';
            return;
        }

        // Naplánujeme dotaz až za 400ms po posledním stisku klávesy
        searchTimer = setTimeout(async () => {
            try {
                console.log("Teď posílám dotaz na server:", query);
                const addrUrl = `http://localhost:8080/api/search/address?query=${encodeURIComponent(query)}`;
                const dbUrl = `http://localhost:8080/api/search/objects?query=${encodeURIComponent(query)}`;

                const [addrRes, dbRes] = await Promise.all([fetch(addrUrl), fetch(dbUrl)]);
                
                // Pokud Nominatim vrátí 403 (Forbidden), uvidíš to v konzoli
                if (!addrRes.ok) console.warn("Nominatim nás dočasně blokuje (příliš mnoho dotazů)");

                const addresses = await addrRes.json();
                const dbObjects = await dbRes.json();

                renderSearchResults(addresses, dbObjects);
            } catch (err) {
                console.error("Chyba vyhledávání:", err);
            }
        }, 400); 
    });

    function getIconByCategory(category) {
        if (!category) return '📍';
        
        const cat = category.toLowerCase();
        
        // Přesné mapování podle tvých kategorií
        if (cat.includes('zastávka mhd')) return '🚏';
        if (cat.includes('školské zařízení')) return '🎓';
        if (cat.includes('parkování') || cat.includes('parkovací zóna')) return '🅿️';
        if (cat.includes('sportoviště')) return '⚽';
        if (cat.includes('cyklostezka')) return '🚲';
        
        // Výchozí ikona pro ostatní (kdyby se objevilo něco jiného)
        return '🏢'; 
    }

function renderSearchResults(addresses, dbObjects) {
    const resultsContainer = document.getElementById('autocomplete-results');
    resultsContainer.innerHTML = '';
    
    const addrList = Array.isArray(addresses) ? addresses : [];
    const dbList = Array.isArray(dbObjects) ? dbObjects : [];

    if (addrList.length === 0 && dbList.length === 0) {
        resultsContainer.style.display = 'none';
        return;
    }

    // 1. Adresy (vždy špendlík)
    addrList.forEach(addr => {
        const div = document.createElement('div');
        div.className = 'search-item';
        div.innerHTML = `📍 <i>Adresa:</i> ${addr.display_name}`;
        div.onclick = () => {
            const lat = parseFloat(addr.lat);
            const lon = parseFloat(addr.lon);
            map.flyTo([lat, lon], 18, { duration: 1.5 });
            clearSearch();
        };
        resultsContainer.appendChild(div);
    });

    // 2. Tvoje objekty z DB (dynamické ikony)
    dbList.forEach(obj => {
        const div = document.createElement('div');
        div.className = 'search-item';
        
        // Zde voláme naši novou funkci pro získání ikony
        const icon = getIconByCategory(obj.category);
        
        div.innerHTML = `${icon} <b>${obj.name}</b> <small style="color: #666;">(${obj.category})</small>`;
        
        div.onclick = () => {
            map.flyTo([obj.lat, obj.lon], 17);
            L.popup()
                .setLatLng([obj.lat, obj.lon])
                .setContent(`<b>${obj.name}</b><br><small>${obj.category}</small>`)
                .openOn(map);
            clearSearch();
        };
        resultsContainer.appendChild(div);
    });

    resultsContainer.style.display = 'block';
}
</script>

</body>
</html>
